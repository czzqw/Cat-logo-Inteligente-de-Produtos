<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Inteligente de Produtos</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <header>
        <h1>Catálogo Inteligente de Produtos</h1>
        <nav>
            <img src="Logotipo.png" alt="Logotipo Catálogo inteligente" id="logotipo">
            <img src="img/PICHAU.jpg" alt="Catálogo Inteligente" id="imagem">
        </nav>
    </header>

    <main>
        <label for="pdtInteli">Escolha um Produto:</label>
        <select name="pdtInteligente" id="pdtInteli">
            <option value="alexa">Amazon Echo Dot</option>
            <option value="camSeg">Camera de Segurança</option>
            <option value="wapPo">Wap Aspirador de pó</option>
            <option value="panelInt">Painel Inteligente</option>
            <option value="fecDig">Fechadura Digital</option>
        </select>

        <input type="button" value="mostrarProduto" onclick="mostrarProduto()">
        <p id="descricao">Selecione um produto para ver a descrição.</p>
    </main>

    <footer>
        <p>&copy; 2026 Catálogo Inteligente de Produtos</p>
    </footer>

    <script src="main.js"></script>

</body>
</html>
